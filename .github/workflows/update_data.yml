name: Update MI Legislature Data

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch:    # Adds a button so you can run it manually

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install requests

    - name: Run the scraper script
      env:
        LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
      run: python mi_legislature_tracker.py

    - name: Commit and push the new CSV
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add mi_reps_data.csv
        git diff --quiet && git diff --staged --quiet || git commit -m "Automated daily data update"
        git push
